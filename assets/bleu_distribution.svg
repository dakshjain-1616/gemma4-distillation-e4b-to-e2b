<svg xmlns="http://www.w3.org/2000/svg" width="700" height="300" viewBox="0 0 700 300">
  <defs>
    <style>.mono { font-family: 'Courier New', Courier, monospace; }</style>
  </defs>

  <!-- Background -->
  <rect width="700" height="300" rx="10" fill="#0d1117"/>

  <!-- Title -->
  <text x="350" y="22" text-anchor="middle" class="mono" font-size="11" font-weight="700" fill="#f0f6fc">Per-Sample BLEU Scores — 20 GSM8K Test Samples</text>
  <text x="350" y="38" text-anchor="middle" class="mono" font-size="9" fill="#8b949e">Student v2 vs teacher CoT traces · green bars = answer correct · dashed line = mean</text>

  <!-- Chart area: x=55..660, y=52..215 (height=163) -->
  <!-- Y range: 0.0–0.70 · scale = 163/0.70 = 232.86 px/unit -->

  <!-- Axes -->
  <line x1="55" y1="215" x2="660" y2="215" stroke="#30363d" stroke-width="1"/>
  <line x1="55" y1="215" x2="55"  y2="52"  stroke="#30363d" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="55" y1="168" x2="660" y2="168" stroke="#21262d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="55" y1="122" x2="660" y2="122" stroke="#21262d" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="55" y1="75"  x2="660" y2="75"  stroke="#21262d" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Y axis labels -->
  <text x="48" y="219" text-anchor="end" class="mono" font-size="9" fill="#8b949e">0.0</text>
  <text x="48" y="172" text-anchor="end" class="mono" font-size="9" fill="#8b949e">0.2</text>
  <text x="48" y="126" text-anchor="end" class="mono" font-size="9" fill="#8b949e">0.4</text>
  <text x="48" y="79"  text-anchor="end" class="mono" font-size="9" fill="#8b949e">0.6</text>

  <!-- Y axis label -->
  <text x="14" y="133" text-anchor="middle" class="mono" font-size="9" fill="#8b949e" transform="rotate(-90,14,133)">BLEU</text>

  <!-- Mean line at 0.329: y = 215 - 0.329*232.86 = 215 - 76.6 = 138.4 → 138 -->
  <!-- Keep mean line INSIDE chart, label inside chart area -->
  <line x1="55" y1="138" x2="660" y2="138" stroke="#e3b341" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="648" y="133" text-anchor="end" class="mono" font-size="8" fill="#e3b341">μ=0.329</text>

  <!-- 20 bars: slot=(660-55)/20=30.25px, bar width=22px, offset=4px from slot start -->
  <!-- bar_x_i = 55 + i*30.25 + 4 -->
  <!-- Heights: bleu * 232.86, y = 215 - height -->

  <!-- id=0: BLEU=0.462, h=107.6→108, y=107, x=59 -->
  <rect x="59"  y="107" width="22" height="108" rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=1: BLEU=0.529, h=123.2→123, y=92, x=89 -->
  <rect x="89"  y="92"  width="22" height="123" rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=2: BLEU=0.280, h=65.2→65, y=150, x=120 -->
  <rect x="120" y="150" width="22" height="65"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=3: BLEU=0.200, h=46.6→47, y=168, x=150 -->
  <rect x="150" y="168" width="22" height="47"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=4: BLEU=0.629, h=146.5→147, y=68, x=181 -->
  <rect x="181" y="68"  width="22" height="147" rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=5: BLEU=0.231, h=53.8→54, y=161, x=211 -->
  <rect x="211" y="161" width="22" height="54"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=6: BLEU=0.586, h=136.5→137, y=78, x=242 -->
  <rect x="242" y="78"  width="22" height="137" rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=7: BLEU=0.423, h=98.5→99, y=116, x=272 -->
  <rect x="272" y="116" width="22" height="99"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=8: BLEU=0.231, h=53.8→54, y=161, x=302 -->
  <rect x="302" y="161" width="22" height="54"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=9: BLEU=0.267, h=62.2→62, y=153, x=333 -->
  <rect x="333" y="153" width="22" height="62"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=10: BLEU=0.194, h=45.2→45, y=170, x=363 -->
  <rect x="363" y="170" width="22" height="45"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=11: BLEU=0.375, h=87.3→87, y=128, x=394 — CORRECT -->
  <rect x="394" y="128" width="22" height="87"  rx="2" fill="#3fb950" opacity="0.9"/>
  <!-- id=12: BLEU=0.333, h=77.6→78, y=137, x=424 -->
  <rect x="424" y="137" width="22" height="78"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=13: BLEU=0.263, h=61.2→61, y=154, x=454 — CORRECT -->
  <rect x="454" y="154" width="22" height="61"  rx="2" fill="#3fb950" opacity="0.9"/>
  <!-- id=14: BLEU=0.324, h=75.4→75, y=140, x=485 -->
  <rect x="485" y="140" width="22" height="75"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=15: BLEU=0.171, h=39.8→40, y=175, x=515 -->
  <rect x="515" y="175" width="22" height="40"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=16: BLEU=0.316, h=73.6→74, y=141, x=545 -->
  <rect x="545" y="141" width="22" height="74"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=17: BLEU=0.300, h=69.9→70, y=145, x=576 -->
  <rect x="576" y="145" width="22" height="70"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=18: BLEU=0.278, h=64.7→65, y=150, x=606 -->
  <rect x="606" y="150" width="22" height="65"  rx="2" fill="#58a6ff" opacity="0.8"/>
  <!-- id=19: BLEU=0.180, h=41.9→42, y=173, x=637 -->
  <rect x="637" y="173" width="22" height="42"  rx="2" fill="#58a6ff" opacity="0.8"/>

  <!-- Correct markers (above bars 11 and 13) -->
  <text x="405" y="122" text-anchor="middle" class="mono" font-size="10" fill="#3fb950">✓</text>
  <text x="465" y="148" text-anchor="middle" class="mono" font-size="10" fill="#3fb950">✓</text>

  <!-- X axis sample labels (y=228, 13px below axis) -->
  <text x="70"  y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">0</text>
  <text x="100" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">1</text>
  <text x="131" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">2</text>
  <text x="161" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">3</text>
  <text x="192" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">4</text>
  <text x="222" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">5</text>
  <text x="253" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">6</text>
  <text x="283" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">7</text>
  <text x="313" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">8</text>
  <text x="344" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">9</text>
  <text x="374" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">10</text>
  <text x="405" y="228" text-anchor="middle" class="mono" font-size="8" fill="#3fb950">11</text>
  <text x="435" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">12</text>
  <text x="465" y="228" text-anchor="middle" class="mono" font-size="8" fill="#3fb950">13</text>
  <text x="496" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">14</text>
  <text x="526" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">15</text>
  <text x="556" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">16</text>
  <text x="587" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">17</text>
  <text x="617" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">18</text>
  <text x="648" y="228" text-anchor="middle" class="mono" font-size="8" fill="#8b949e">19</text>
  <text x="357" y="242" text-anchor="middle" class="mono" font-size="9" fill="#8b949e">Sample ID</text>

  <!-- Legend row (y=254..282) -->
  <rect x="55" y="254" width="590" height="32" rx="5" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <rect x="68"  y="263" width="10" height="10" rx="2" fill="#58a6ff" opacity="0.8"/>
  <text x="82"  y="272" class="mono" font-size="9" fill="#8b949e">Incorrect  (18 samples)</text>
  <rect x="210" y="263" width="10" height="10" rx="2" fill="#3fb950" opacity="0.9"/>
  <text x="224" y="272" class="mono" font-size="9" fill="#3fb950">Correct  (#11 Toula/bakery,  #13 Melanie/saleswoman)</text>
  <text x="624" y="272" text-anchor="end" class="mono" font-size="9" fill="#e3b341">0.171–0.629</text>
</svg>
